config: configs/train_config.yaml
teacher_type: hf
student_type: mamba
teacher_model_name_or_path: sshleifer/tiny-gpt2
tokenizer_name_or_path: sshleifer/tiny-gpt2
local_files_only: true
dataset_type: text
data_path: ${CSDM_DATA_PATH}
seq_len: 128
batch_size: 1
gradient_accumulation_steps: 16
max_steps: 1000
student_hidden_size: 128
student_num_layers: 4
mixed_precision: bf16
ce_weight: 0.2
kd_weight: 1.0
csdm_weight: 0.0
topk_enabled: false
top_k: 128
teacher_cache_enabled: true
teacher_cache_dir: /tmp/csdm_real_small_cache/kd
checkpoint_output_dir: /tmp/csdm_real_small_ckpt/kd
save_every_steps: 100
save_at_end: true
