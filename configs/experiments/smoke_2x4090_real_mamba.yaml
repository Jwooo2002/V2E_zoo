config: configs/train_config.yaml
distributed_mode: env
distributed_backend: nccl
teacher_type: hf
student_type: mamba
teacher_model_name_or_path: sshleifer/tiny-gpt2
tokenizer_name_or_path: sshleifer/tiny-gpt2
hf_device_map: none
hf_torch_dtype: bfloat16
local_files_only: true
dataset_type: text
data_path: data/smoke.txt
max_steps: 1
seq_len: 16
batch_size: 1
gradient_accumulation_steps: 4
student_hidden_size: 64
student_num_layers: 2
student_state_extraction: last_hidden
off_state_mode: projection
delta_alt_mode: delta_projection
off_logits_mode: lm_head
off_state_detach_direction: true
mixed_precision: bf16
csdm_weight: 0.03
topk_enabled: true
top_k: 128
teacher_cache_enabled: true
teacher_cache_dir: /tmp/csdm_smoke_2x4090_real_mamba_cache
teacher_cache_distributed_policy: rank_local
checkpoint_output_dir: /tmp/csdm_smoke_2x4090_real_mamba_ckpt
save_at_end: true
