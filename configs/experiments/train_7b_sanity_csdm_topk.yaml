config: configs/train_config.yaml
teacher_type: hf
student_type: mamba
teacher_model_name_or_path: ${CSDM_TEACHER_PATH}
tokenizer_name_or_path: ${CSDM_TOKENIZER_PATH}
local_files_only: true
trust_remote_code: false
use_safetensors: true
device_map: auto
dataset_type: text
data_path: ${CSDM_DATA_PATH}
seq_len: 128
batch_size: 1
gradient_accumulation_steps: 16
max_steps: 100
student_hidden_size: 128
student_num_layers: 4
mixed_precision: bf16
ce_weight: 0.2
kd_weight: 1.0
csdm_weight: 0.03
topk_enabled: true
top_k: 256
teacher_cache_enabled: false
teacher_cache_dir: /tmp/csdm_7b_sanity_cache/csdm_topk
checkpoint_output_dir: /tmp/csdm_7b_sanity_ckpt/csdm_topk
save_every_steps: 25
save_at_end: true
