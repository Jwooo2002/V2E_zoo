seed: 42
teacher_type: mock
student_type: mock
mixed_precision: bf16
gradient_accumulation_steps: 16
learning_rate: 1e-4
max_grad_norm: 1.0

data:
  dataset_type: mock
  path:
  tokenizer_name_or_path:
  seq_len: 128
  stride:
  max_examples:
  text_field: text
  add_eos: true
  shuffle: false
  seed: 42
  use_fast: true
  trust_remote_code: false
  local_files_only: false
  pad_token_strategy: eos

student:
  type: mock
  model_name_or_path:
  vocab_size: 50257
  hidden_size: 768
  num_layers:
  state_size:
  torch_dtype: bfloat16
  device:
  trust_remote_code: false
  use_pretrained: false
  local_files_only: false
  delta_perturb_eps: 0.10
  noise_sigma: 0.01
  use_reference_forward: false
  state_extraction: last_hidden
  expose_states: true
  off_state_mode: projection
  delta_alt_mode: delta_projection
  off_logits_mode: lm_head
  off_state_detach_direction: true

topk:
  enabled: false
  top_k: 256
  include_labels: true
  renormalize_topk: true

teacher_cache:
  enabled: false
  cache_dir: cache/teacher_logits
  format: pt
  dtype: float16
  device: cpu
  use_top_k: false
  top_k: 256
  overwrite: false

loss:
  ce_weight: 0.2
  kd_weight: 1.0
  csdm_weight: 0.1
  tau: 2.0
  lambda_score: 0.1
  residual_clip: 3.0
  scale_min: 0.05
  scale_max: 5.0

mock:
  enabled: true
  batch_size: 2
  seq_len: 128
  vocab_size: 1024
  hidden_size: 256
  positions_per_sequence: 64
  num_samples: 1024
  ignore_index: -100
