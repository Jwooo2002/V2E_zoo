seed: 42
mixed_precision: bf16
gradient_accumulation_steps: 16
learning_rate: 1e-4
max_grad_norm: 1.0
top_k_kd:

loss:
  ce_weight: 0.2
  kd_weight: 1.0
  csdm_weight: 0.1
  tau: 2.0
  lambda_score: 0.1
  residual_clip: 3.0
  scale_min: 0.05
  scale_max: 5.0

mock:
  enabled: true
  batch_size: 2
  seq_len: 128
  vocab_size: 1024
  hidden_size: 256
  positions_per_sequence: 64
  num_samples: 1024
  ignore_index: -100
