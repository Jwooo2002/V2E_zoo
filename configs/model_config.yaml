teacher:
  type: mock
  load_weights: false
  logits_cache: true
  logits_cache_notes:
    - Optional Stage 5B utility only; mock training does not require cache usage.
    - Cache keys must describe clean teacher token inputs and teacher/tokenizer metadata only.
  mock:
    vocab_size: 1024
    hidden_size: 256

student:
  type: mock
  model_name_or_path:
  vocab_size: 50257
  hidden_size: 768
  num_layers:
  state_size:
  torch_dtype: bfloat16
  device:
  trust_remote_code: false
  use_pretrained: false
  local_files_only: false
  delta_perturb_eps: 0.10
  noise_sigma: 0.01
  use_reference_forward: false
  state_extraction: last_hidden
  expose_states: true
  off_state_mode: projection
  delta_alt_mode: delta_projection
  off_logits_mode: lm_head
  off_state_detach_direction: true
  notes:
    - Real Mamba is optional and used only by explicit smoke checks or explicit student_type=mamba smoke training.
    - Mock training and tests do not require mamba-ssm.
    - Stage 6C real forward smoke uses public MambaLMHeadModel when available.
    - Stage 6E off-state construction is an approximation over student-side h; it is not true Mamba delta-kernel perturbation.

hf_teacher_example:
  enabled: false
  type: hf
  model_name_or_path: meta-llama/Meta-Llama-3-8B-Instruct
  torch_dtype: bfloat16
  device_map: auto
  trust_remote_code: false
  attn_implementation:
  local_files_only: false
  use_safetensors: true
  load_in_8bit: false
  load_in_4bit: false
  notes:
    - Opt-in only; mock teacher remains the runnable default.
    - Set local_files_only true when using a pre-downloaded local cache/path.
    - Real KD requires compatible token indices or cached/top-k teacher logits.

stage: 6F
real_model_imports: opt_in_hf_teacher_and_real_mamba_student_only
hf_teacher_smoke_training:
  enabled_by_cli: true
  student_type: mock_or_mamba
  notes:
    - The real HuggingFace teacher smoke path can use MockStudentMamba or explicit RealMambaStudent.
    - Teacher inputs are clean input_ids plus all-ones attention_mask from the train loop.
    - Tests use a fake transformers module and do not download model weights.
